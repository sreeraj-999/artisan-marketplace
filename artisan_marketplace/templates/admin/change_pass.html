{% extends 'base.html' %}

{% block title %}Change Password - Artisan Marketplace{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; width: 100%;">
    <h1 class="page-title">Change Password</h1>
    <p class="page-subtitle">Update your account credentials to keep your profile secure.</p>
    
    <div class="content-card">
        <form id="form1" name="form1" method="post" action="/changepass_post">
            {% csrf_token %}
            <div class="form-group">
                <label for="textfield">Current Password</label>
                <input type="password" name="textfield" id="textfield" class="form-control" placeholder="Enter current password" required />
            </div>
            
            <div class="form-group">
                <label for="textfield2">New Password</label>
                <input type="password" name="textfield2" id="textfield2" class="form-control" placeholder="Enter new password" required />
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="textfield3">Confirm New Password</label>
                <input type="password" name="textfield3" id="textfield3" class="form-control" placeholder="Confirm new password" required />
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="/" class="btn btn-secondary">Cancel</a>
                <button type="submit" name="button" id="button" class="btn btn-primary">
                    🔒 Change Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
