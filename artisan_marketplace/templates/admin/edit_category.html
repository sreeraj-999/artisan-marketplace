{% extends 'base.html' %}

{% block title %}Edit Category - Artisan Marketplace{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; width: 100%;">
    <h1 class="page-title">Edit Category</h1>
    <p class="page-subtitle">Update the name of the selected product category.</p>
    
    <div class="content-card">
        <form id="form1" name="form1" method="post" action="/editcategory_post/{{ id }}">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="textfield">Category Name</label>
                <input type="text" name="textfield" id="textfield" class="form-control" value="{{ data.category }}" placeholder="Enter category name" required />
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="/viewcategory" class="btn btn-secondary">Cancel</a>
                <button type="submit" name="button" id="button" class="btn btn-primary">
                    ✏️ Update Category
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
