{% extends 'base.html' %}

{% block title %}Login - Artisan Marketplace{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="content-card" style="width: 100%; max-width: 450px; margin-top: 0;">
        <h1 class="page-title" style="text-align: center; margin-bottom: 0.5rem;">Welcome Back</h1>
        <p class="page-subtitle" style="text-align: center; margin-bottom: 2rem;">Log in to access your dashboard</p>
        
        <form id="form1" name="form1" method="post" action="/log_post">
            {% csrf_token %}
            <div class="form-group">
                <label for="textfield">Username</label>
                <input type="text" name="textfield" id="textfield" class="form-control" placeholder="Enter your username" required />
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="textfield2">Password</label>
                <input type="password" name="textfield2" id="textfield2" class="form-control" placeholder="Enter your password" required />
            </div>
            
            <button type="submit" name="button" id="button" class="btn btn-primary" style="width: 100%;">
                🔑 Login
            </button>
        </form>
        
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
            Are you an artisan? <a href="/artisan_signup" style="color: #c084fc; text-decoration: none; font-weight: 600;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
