{% extends 'base.html' %}

{% block title %}Add Product - Artisan Marketplace{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; width: 100%;">
    <h1 class="page-title">Add Product</h1>
    <p class="page-subtitle">List a new handcrafted product in your catalog.</p>
    
    <div class="content-card">
        <form id="form1" name="form1" method="post" action="/artisan_addproduct_post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="e.g. Vintage Clay Teapot" required />
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" step="0.01" name="price" id="price" class="form-control" placeholder="e.g. 45.00" required />
                </div>
                
                <div class="form-group">
                    <label for="quantity">Initial Quantity</label>
                    <input type="number" name="quantity" id="quantity" class="form-control" placeholder="e.g. 10" required />
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="image">Product Image</label>
                <input type="file" name="image" id="image" class="form-control" accept="image/*" required style="padding: 0.6rem 1rem;" />
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="/artisan_viewproducts" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    📦 Add Product
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
